[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# @netlify/plugin-nextjs v5 : le formulaire est defini dans public/__forms.html
# Les fichiers Next.js ne doivent PAS contenir data-netlify pour eviter le build failure
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Scheduled function : rafraichit les sitemaps une fois par jour a 03:00 UTC
[functions."refresh-sitemaps"]
  schedule = "0 3 * * *"

# Scheduled function : pousse 500 URLs/jour a IndexNow (Bing/Yandex) a 02:00 UTC
# Couvre les 26 000+ fiches en ~50 jours en priorisant les recentes mises a jour
[functions."indexnow-daily"]
  schedule = "0 2 * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), interest-cohort=()"
    # CSP en mode Report-Only pour valider sans bloquer (passer en Content-Security-Policy après 48h de monitoring)
    Content-Security-Policy-Report-Only = "default-src 'self'; img-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co https://api.resend.com; font-src 'self' data:; frame-ancestors 'none'"

