name: Enrichissement téléphones RoullePro

on:
  # Toutes les heures à HH:05 (~330 fiches/heure max si DFS rapide)
  schedule:
    - cron: "5 * * * *"
  # Permet de déclencher manuellement depuis l'onglet Actions
  workflow_dispatch:
    inputs:
      max_minutes:
        description: "Durée max (minutes, 1-340)"
        required: false
        default: "50"
      batch_size:
        description: "Batch size (1-500)"
        required: false
        default: "100"

# Empêche 2 runs simultanés (évite collisions sur la queue)
concurrency:
  group: phone-enrichment
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    # Timeout dur GitHub Actions = 6h ; on garde une marge
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run enrichment worker
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAX_MINUTES: ${{ github.event.inputs.max_minutes || '50' }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '100' }}
        run: |
          python scripts/phone_enrichment/enrich.py
